name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'src/Monitoring/EverTask.Monitor.Api/UI/pnpm-lock.yaml'

      - name: Install UI dependencies
        run: pnpm install
        working-directory: src/Monitoring/EverTask.Monitor.Api/UI

      - name: Build UI
        run: pnpm run build
        working-directory: src/Monitoring/EverTask.Monitor.Api/UI

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore EverTask.slnx

      - name: Build
        run: dotnet build EverTask.slnx --no-restore

      # Tests run only on .NET 9 - multi-target testing disabled (flaky on GitHub Actions)
      # To run on all frameworks, remove --framework net9.0
      - name: Test (EverTask.Tests)
        run: dotnet test test/EverTask.Tests/EverTask.Tests.csproj --no-restore --verbosity normal --framework net9.0

      - name: Test (EverTask.Tests.Storage - exclude SQL Server + Postgres)
        run: dotnet test test/EverTask.Tests.Storage/EverTask.Tests.Storage.csproj --no-restore --verbosity normal --framework net9.0 --filter "FullyQualifiedName!~SqlServerEfCoreTaskStorageTests&FullyQualifiedName!~PostgresEfCoreTaskStorageTests&FullyQualifiedName!~AuditLevelIntegrationTests"

      # P2-7: the (de)serializer is the migration-critical surface (STJ 10.0.9 is pinned uniformly across TFMs,
      # but cross-TFM agreement must be pinned by tests too). Run the DETERMINISTIC serialization + schedule
      # validation suites on net8.0 and net10.0 as well. Timing-sensitive recovery integration stays net9-only
      # (multi-target full runs are flaky on GitHub Actions — see the note above).
      - name: Test serialization across TFMs (net8.0)
        run: dotnet test test/EverTask.Tests/EverTask.Tests.csproj --no-restore --verbosity normal --framework net8.0 --filter "FullyQualifiedName~Serialization|FullyQualifiedName~IntervalValidation"

      - name: Test serialization across TFMs (net10.0)
        run: dotnet test test/EverTask.Tests/EverTask.Tests.csproj --no-restore --verbosity normal --framework net10.0 --filter "FullyQualifiedName~Serialization|FullyQualifiedName~IntervalValidation"

